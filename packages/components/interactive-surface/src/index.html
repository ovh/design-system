<!DOCTYPE html>
<html dir='ltr' lang='en'>
<head>
  <meta charset='utf-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0' />
  <title>Dev ods-interactive-surface</title>

  <script type="module">
    !window.ods && (window.ods = {config: {logging: {active:true}}});
  </script>

  <script type='module' src='/build/osds-interactive-surface.esm.js'></script>
  <script nomodule src='/build/osds-interactive-surface.js'></script>
  <link rel="stylesheet" href="/build/osds-interactive-surface.css">
</head>
<body>

<osds-interactive-surface inline>
  <osds-select-option value="1">Option 1</osds-select-option>
  <osds-select-option value="2">Option 2</osds-select-option>
  <p>Paragraph</p>
</osds-interactive-surface>

<script>
  setTimeout(() => {
    document.querySelectorAll('osds-interactive-surface').forEach((elem) => {
      const newOption = document.createElement('osds-select-option');
      newOption.value = '3';
      newOption.textContent = 'Option 3';
      elem.appendChild(newOption);
    });
  }, 2000);
</script>
</body>
</html>
