  <meta charset='utf-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0' />
  <title>Dev ods-combobox</title>

  <script type='module' src='/build/ods-combobox.esm.js'></script>
  <script nomodule src='/build/ods-combobox.js'></script>
  <link rel="stylesheet" href="/build/ods-combobox.css">

    * {
      font-family: 'Source Sans Pro', sans-serif;
    }
  </style>

<body>
  <p>Single</p>
  <ods-combobox id="single" is-required name="single" default-value="cat" create-label="New value" is-clearable placeholder="Single">
    <option value="dog" toto="1">Dog</option>
    <option value="cat" toto="2">Cat</option>
    <option value="hamster" toto="3">Hamster</option>
    <option value="parrot" toto="4">Parrot</option>
    <option value="spider" toto="5">Spider</option>
    <option value="goldfish" toto="6">Goldfish</option>
  </ods-combobox>

  <br />
  <button id="btn-update-value">Update value</button>
  <button id="btn-check-validity">Check validity</button>
  <button id="btn-clear">Clear</button>
  <button id="btn-reset">Reset</button>

  <script>
    const singleCombobox = document.querySelector('#single');
    const btnCheckValidity = document.querySelector('#btn-check-validity');
    const btnClear = document.querySelector('#btn-clear');
    const btnReset = document.querySelector('#btn-reset');
    const btnUpdateValue = document.querySelector('#btn-update-value');

    singleCombobox.addEventListener('odsChange', (e) => {
      console.log(e.detail);
    });

    btnCheckValidity.addEventListener('click', async() => {
      console.log(await singleCombobox.checkValidity());
    });

    btnClear.addEventListener('click', () => {
      singleCombobox.clear();
    });

    btnReset.addEventListener('click', () => {
      singleCombobox.reset();
    });

    btnUpdateValue.addEventListener('click', () => {
      singleCombobox.value = 'spider';
    });
  </script>
