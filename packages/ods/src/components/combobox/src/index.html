<!DOCTYPE html>
<html dir='ltr' lang='en'>
<head>
  <meta charset='utf-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0' />
  <title>Dev ods-combobox</title>

  <script type='module' src='/build/ods-combobox.esm.js'></script>
  <script nomodule src='/build/ods-combobox.js'></script>
  <link rel="stylesheet" href="/build/ods-combobox.css">

  <style>
    * {
      font-family: 'Source Sans Pro', sans-serif;
    }
  </style>
</head>

<body>
  <p>Single</p>
  <ods-combobox>
    <option value="dog">Dog</option>
    <option value="cat">Cat</option>
    <option value="hamster">Hamster</option>
    <option value="parrot">Parrot</option>
    <option value="spider">Spider</option>
    <option value="goldfish">Goldfish</option>
  </ods-combobox>

  <p>Multi</p>
  <ods-combobox allow-multiple>
    <option value="dog">Dog</option>
    <option value="cat">Cat</option>
    <option value="hamster">Hamster</option>
    <option value="parrot">Parrot</option>
    <option value="spider">Spider</option>
    <option value="goldfish">Goldfish</option>
  </ods-combobox>

  <p>Custom empty label</p>
  <ods-combobox no-result-label="Aucun résultat trouvé">
    <option value="dog">Dog</option>
    <option value="cat">Cat</option>
    <option value="hamster">Hamster</option>
    <option value="parrot">Parrot</option>
    <option value="spider">Spider</option>
    <option value="goldfish">Goldfish</option>
  </ods-combobox>

  <p>Option group</p>
  <ods-combobox>
    <option value="">Select gear...</option>
    <optgroup label="Climbing">
      <option value="pitons">Pitons</option>
      <option value="cams">Cams</option>
      <option value="nuts">Nuts</option>
      <option value="bolts">Bolts</option>
      <option value="stoppers">Stoppers</option>
      <option value="sling">Sling</option>
    </optgroup>
    <optgroup label="Skiing">
      <option value="skis">Skis</option>
      <option value="skins">Skins</option>
      <option value="poles">Poles</option>
    </optgroup>
  </ods-combobox>
</body>
</html>
