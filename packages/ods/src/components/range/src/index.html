  <style>
    .ods-range-fake {
      position: relative;
      width: fit-content;
      display: grid;
    }

    .input {
      position: relative;
      z-index: 2;
      margin: 0;
      appearance: none;
      outline: none;
      border-radius: var(--ods-border-radius-sm);
      cursor: pointer;
      height: 8px;
      border-width: 0;
      background: cyan;
    }

    .input::-webkit-slider-thumb {
      appearance: none;
      box-sizing: border-box;
      border: 1px solid var(--ods-color-neutral-300);
      border-radius: 50%;
      box-shadow: none;
      background-color: var(--ods-color-neutral-000);
      cursor: pointer;
      width: 4px;
      height: 4px;
      pointer-events: auto;
    }

    .input::-moz-range-thumb {
      appearance: none;
      box-sizing: border-box;
      border: 1px solid var(--ods-color-neutral-300);
      border-radius: 50%;
      box-shadow: none;
      background-color: var(--ods-color-neutral-000);
      cursor: pointer;
      width: 20px;
      height: 20px;
      pointer-events: auto;
    }

    .ticks {
      position: absolute;
      inset: 0 2px; // thumb width / 2
      z-index: 1;
    }

    .tick {
      position: absolute;
      background-color: red;
      width: 1px;
      height: 20px;
    }

    .tick.lower {
      background-color: blue;
    }
  </style>

  <div class="ods-range-fake">
    <input class="input" type="range" id="temp" name="temp" list="values" />
    <input type="range" id="temp2" name="temp2" list="values" style="position: inherit; z-index: 10;" />
    <datalist id="values">

      <option value="50"></option>
      <option value="100"></option>

<!--      KO datalist labels are not displayed on safari -->

<!--      <option value="25" label="|"></option>-->

<!--      <option value="100" label="|"></option>-->
    </datalist>
    <div class="ticks">
    </div>
  </div>

  <script>
    const range = document.querySelector('#temp');
    const ticksContainer = document.querySelector('.ticks');
    const optionElements = document.querySelectorAll('datalist > option');

    const options = Array.from(optionElements).map((el) => parseInt(el.value, 10));
    const ratio = 100 / options[options.length - 1];

    options.forEach((option, idx) => {
      const tick = document.createElement('div');
      tick.tickValue = option;

      tick.classList.add('tick');
      if (tick.tickValue <= range.value) {
        tick.classList.add('lower');
      }

      tick.style.left = `${option * ratio}%`;
      ticksContainer.appendChild(tick);
    });

    const tickElements = document.querySelectorAll('.tick');

    range.addEventListener('input', (e) => {
      tickElements.forEach((tick) => {
        if (tick.tickValue <= e.target.value) {
          tick.classList.add('lower');
        } else {
          tick.classList.remove('lower');
        }
      })
    })

    // const optionElements = document.querySelectorAll('datalist > option');

    // });
  </script>
