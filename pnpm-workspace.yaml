packages:
  - "packages/examples/*"
  - "packages/ods-react"
  - "packages/ods-react/src/components/*"
  - "packages/ods-recipes"
  - "packages/ods-recipes/src/components/*"
  - "packages/storybook"
  - "packages/themes"

allowBuilds:
  '@parcel/watcher': false
  esbuild: true
  husky: true
  nx: true
  puppeteer: true
  sharp: true
  unrs-resolver: set this to true or false

minimumReleaseAgeExclude:
  - '@playwright/test@1.61.1'
  - playwright-core@1.61.1
  - playwright@1.61.1

overrides:
  "@types/scheduler": "< 0.23.0"
  "@types/react": "18.2.56"

patchedDependencies:
  '@fluentui/storybook-llms-extractor@0.0.3': patches/@fluentui__storybook-llms-extractor@0.0.3.patch
